name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: readinessos
          POSTGRES_USER: readinessos
          POSTGRES_PASSWORD: readinessos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U readinessos -d readinessos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://readinessos:readinessos@localhost:5432/readinessos?schema=public
      DIRECT_URL: postgresql://readinessos:readinessos@localhost:5432/readinessos?schema=public
      AUTH_SECRET: ci-only-auth-secret-do-not-use-in-production
      AUTH_DEMO_EMAIL: demo@readinessos.local
      AUTH_DEMO_PASSWORD: ci-demo-password
      DEMO_LOGIN_ENABLED: 'true'
    steps:
      - uses: actions/checkout@v4
      # setup-node 在启用 pnpm 缓存前需要先能找到 pnpm 可执行文件。
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm db:format
      - run: git diff --exit-code -- packages/database/prisma/schema.prisma
      - run: pnpm db:validate
      - run: pnpm db:deploy
      - run: pnpm db:generate
      # Prisma Client 由 generate 生成，必须在依赖其类型的 TypeScript 检查前完成。
      - run: pnpm typecheck
      - run: pnpm db:test:migrations
      - run: pnpm test
      - run: pnpm build
      - run: pnpm markdown:lint
